# syntax=docker-registry.wikimedia.org/repos/releng/blubber/buildkit:v0.19.0
version: v4
base: docker-registry.wikimedia.org/golang1.19
variants:
  download-deps:
    lives:
      in: /src
    builders:
     - custom:
         requirements: [go.mod, go.sum]
         command:
           - go
           - mod
           - download
     - custom:
         command:
           - chmod
           - -R
           - "777"
           - /go/pkg/mod

  test:
    includes:
      - download-deps
    copies:
      - local
    entrypoint:
      - go
      - test
      - ./...

  build:
    includes:
      - download-deps
    builders:
     - custom:
         requirements: [./]
         command:
           - make
           - build-api

  image:
    lives:
      in: /src
    copies:
      - from: build
        source: /src/builds-api
        destination: /builds-api
    entrypoint: [/builds-api]
