replicas: 2
chartRepository: tools

image:
  # name and tag are currently used by CI
  name: tools-harbor.wmcloud.org/toolforge/builds-api
  # Override if needed for development purposes
  tag: OVERWRITTEN_BY_CI
  pullPolicy: IfNotPresent

resources:
  limits:
    memory: 100Mi
    cpu: 500m
  requests:
    memory: 100Mi
    cpu: 500m

api:
  failurePolicy: Fail
  secretName: builds-api-certs

nginx:
  image:
    repository: docker-registry.tools.wmflabs.org/nginx
    nginxTag: latest
    pullpolicy: Always

certificates:
  internalClusterDomain: "{{ .Values.chartRepository }}.local"
  apiGatewayCa:
    name: api-gateway-backend-ca
    kind: ClusterIssuer
    group: cert-manager.io

config:
  debug: false
  port: 8000
  harborRepository: tools-harbor.wmcloud.org
  okBuildsToKeep: 1
  failedBuildsToKeep: 2
