---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: builds-api-access-rb
  namespace: image-build
subjects:
  - kind: ServiceAccount
    name: builds-api
    namespace: "{{ .Release.Namespace }}"
roleRef:
  kind: Role
  name: builds-api-access
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: builds-api-nginx-default-psp
  namespace: builds-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: default
subjects:
- kind: ServiceAccount
  name: builds-api
  namespace: builds-api
