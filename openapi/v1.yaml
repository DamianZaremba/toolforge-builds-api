openapi: 3.1.0
info:
  title: Toolforge builds API
  version: 0.0.1
servers:
  - url: "/v1"

paths:
  /healthz:
    get:
      operationId: healthcheck
      responses:
        "200":
          description: Returns the health status of the service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Returned when the service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
      security: []
  /build:
    post:
      operationId: start
      requestBody:
        content:
          "application/json":
            schema:
              $ref: "#/components/schemas/BuildParameters"
        required: true
      responses:
        "200":
          description: returns the newly created build information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewBuild"
        "400":
          description: Bad parameters passed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthorized"
        "500":
          description: An internal error happened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalError"
      security:
        - key: []
      x-codegen-request-body-name: new_build
    get:
      operationId: list
      responses:
        "200":
          description: Returns the list of builds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Build"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthorized"
        "500":
          description: An internal error happened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalError"
      security:
        - key: []
  /build/latest:
    get:
      operationId: latest
      responses:
        "200":
          description: The latest build
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Build"
        "400":
          description: Bad parameters passed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthorized"
        "404":
          description: The latest build was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
        "500":
          description: An internal error happened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalError"
      security:
        - key: []
  /build/{id}:
    get:
      operationId: get
      parameters:
        - name: id
          in: path
          description: Id of the build
          required: true
          style: simple
          explode: false
          schema:
            type: string
      responses:
        "200":
          description: The build was found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Build"
        "400":
          description: Bad parameters passed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthorized"
        "404":
          description: The build was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
        "500":
          description: An internal error happened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalError"
      security:
        - key: []
    delete:
      operationId: delete
      parameters:
        - name: id
          in: path
          description: Id of the build
          required: true
          style: simple
          explode: false
          schema:
            type: string
      responses:
        "200":
          description: The build was deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildId"
        "400":
          description: Bad parameters passed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthorized"
        "404":
          description: The build was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
        "500":
          description: An internal error happened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalError"
      security:
        - key: []
  /build/{id}/cancel:
    put:
      operationId: cancel
      parameters:
        - name: id
          in: path
          description: Id of the build
          required: true
          style: simple
          explode: false
          schema:
            type: string
      responses:
        "200":
          description: The build was canceled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Build"
        "400":
          description: Bad parameters passed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthorized"
        "404":
          description: The build was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
        "409":
          description: The build is not in a cancelable state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conflict"
        "500":
          description: An internal error happened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalError"
      security:
        - key: []
  /clean:
    post:
      operationId: clean
      parameters: []
      responses:
        "200":
          description: Returns a summary of what was cleaned up.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthorized"
        "500":
          description: An internal error happened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalError"
      security:
        - key: []
  /build/{id}/logs:
    get:
      operationId: logs
      parameters:
        - name: id
          in: path
          description: Id of the build
          required: true
          schema:
            type: string
        - name: follow
          in: query
          description: Follow the logs
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description:
            returns newline separated sequence of "#/components/schemas/BuildLog" or
            "#/component/schemas/InternalError" if there was an error after the
            streaming has started (as the http status code can't be changed)
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/BuildLog"
        "400":
          description: Bad parameters passed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthorized"
        "404":
          description: The build was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
        "500":
          description: An internal error happened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalError"
      security:
        - key: []
  /quota:
    get:
      operationId: quota
      responses:
        "200":
          description: Returns the quota information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quota"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthorized"
        "500":
          description: An internal error happened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalError"
      security: []
  /openapi.json:
    get:
      operationId: openapi
      parameters: []
      responses:
        "200":
          description: returns the openapi definition
          content:
            application/json:
              schema:
                type: object
  /metrics:
    get:
      operationId: metrics
      responses:
        "200":
          description: Returns the metrics of the service
          content:
            text/plain:
              schema:
                type: string
      security: []
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - OK
            - ERROR
        message:
          type: string
    NotFound:
      type: object
      properties:
        message:
          type: string
    BadRequest:
      type: object
      properties:
        message:
          type: string
    Unauthorized:
      type: object
      properties:
        message:
          type: string
    InternalError:
      type: object
      properties:
        message:
          type: string
    Conflict:
      type: object
      properties:
        message:
          type: string
    BuildLog:
      type: object
      properties:
        line:
          type: string
    NewBuild:
      type: object
      properties:
        name:
          type: string
        parameters:
          $ref: "#/components/schemas/BuildParameters"
    BuildId:
      type: object
      properties:
        id:
          type: string
    # TODO: remove this as it doesn't seem to be used
    principal:
      type: object
      properties:
        user:
          type: string
    Build:
      allOf:
        - $ref: "#/components/schemas/BuildCondition"
        - type: object
          properties:
            build_id:
              type: string
            start_time:
              type: string
            end_time:
              type: string
            parameters:
              $ref: "#/components/schemas/BuildParameters"
            destination_image:
              type: string
    BuildParameters:
      required:
        - source_url
      type: object
      properties:
        source_url:
          type: string
          description:
            URL to the public git repository that contains the source code
            to build
        ref:
          type: string
          description: Source code reference to build (ex. a git branch name)
        envvars:
          type: object
          additionalProperties:
            type: string
          description: Environment variables and values to be set at build time
        image_name:
          type: string
          description: The name of the image to be built
    BuildCondition:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/BuildStatus"
        message:
          type: string
    BuildStatus:
      type: string
      enum:
        - BUILD_RUNNING
        - BUILD_SUCCESS
        - BUILD_FAILURE
        - BUILD_CANCELLED
        - BUILD_TIMEOUT
        - BUILD_UNKNOWN
    Quota:
      type: object
      properties:
        categories:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              items:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    limit:
                      type: string
                    used:
                      type: string
                    available:
                      type: string
                    capacity:
                      type: string
    CleanResponse:
      type: object
      properties:
        message:
          type: string

  securitySchemes:
    key:
      type: apiKey
      name: ssl-client-subject-dn
      in: header
